version: "3.3"
services:
  
  stwe-data-poc:
    hostname: stwe-data-poc
    container_name: stwe-data-poc
    image: dockerhub.toowe.com:18443/ai-tools/stwe-data-poc:1.0
    restart: always
    environment:
      JAVA_OPTS: -Xms128m -Xmx1g -XX:+PrintConcurrentLocks -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/var/heapdumps/stwe-data-poc_heapdump.hprof
      SPRING_PROFILES_ACTIVE: "prd"
      K3CLOUD_URL: http://192.168.1.47/K3Cloud
      APP_PY_ENGINE_BASE_URLS: http://192.168.1.137:30201/azs-unstructured-api/file/parser/
      LLM_API_BASE_URL: https://api.moonshot.cn/v1/chat/completions
      LLM_API_MODEL: kimi-k2.5
      LLM_API_KEY: sk-hUygjUKgjvT9xe727YQFNQGFrSNVWf5U2bQkkx2jNBQSK7L2
      LLM_THINKING_ENABLED: false
      SERVER_URL: http://192.168.1.137:20263
      CUSTOMS_DATA_ACCESS_MODE: remote
      CUSTOMS_DATA_SMB_HOST: 192.168.1.3
      CUSTOMS_DATA_SMB_SHARE_PATH: /财务部/2-2核算组/23_智能体抓取数据源
    ports:
      - 20263:20263
    volumes:
      - ./java-data/stwe-data-poc/logs:/ai-tools/logs
      - ./prompts:/prompts/
      - ./output:/output/
      - ./heapdumps:/var/heapdumps
    networks:
      - ai_tools


networks:
  ai_tools:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/16
