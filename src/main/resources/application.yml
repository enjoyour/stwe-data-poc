# ============================================
# 服务器配置
# ============================================
server:
  port: 20263  # 服务端口
  servlet:
    context-path: /  # 应用上下文路径

# ============================================
# Spring框架配置
# ============================================
spring:
  main:
    allow-bean-definition-overriding: true  # 允许Bean定义覆盖
  servlet:
    multipart:
      max-file-size: 100MB  # 最大上传文件大小
      max-request-size: 100MB  # 最大请求大小
  application:
    name: stwe-data-poc  # 应用名称

# ============================================
# Swagger/API文档配置
# ============================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI访问路径
    tags-sorter: alpha  # 标签排序方式（字母顺序）
  api-docs:
    path: /v3/api-docs  # API文档路径
  group-configs:
    - group: 'default'
      display-name: '测试'
      paths-to-match: '/**'
      packages-to-scan: com.toowe.stwe.controller
  default-flat-param-object: true  # 使用扁平化参数对象

# ============================================
# 业务应用配置
# ============================================
app:
  # --- 大模型API配置 ---
  llm-api:
    url: ${LLM_API_BASE_URL}  # 大模型API基础地址（如：https://api.moonshot.cn/v1/chat/completions）
    model: ${LLM_API_MODEL}  # 大模型名称（如：kimi-k2.5）
    api-key: ${LLM_API_KEY}  # 大模型API密钥
    thinking-enabled: ${LLM_THINKING_ENABLED:false}  # 是否启用思考模式（true:启用，false:禁用）
    # 重试机制配置（用于处理网络抖动、DNS解析失败等偶发错误）
    max-retries: ${LLM_API_MAX_RETRIES:3}  # 最大重试次数（默认3次）
    retry-delay-base: ${LLM_API_RETRY_DELAY_BASE:1000}  # 基础重试延迟（毫秒，默认1000ms，使用指数退避策略）
    timeout: ${LLM_API_TIMEOUT:60000}  # HTTP请求超时时间（毫秒，默认60秒）

  # --- 文件解析API配置 ---
  parser-api:
    url: ${APP_PY_ENGINE_BASE_URLS}  # 远程解析服务地址
    grant-code: test  # 解析服务授权码
    # 文件解析器类型配置（根据文件扩展名选择对应的解析器）
    parser-type:
      docx: ${PARSER_TYPE_DOCX:to_html}  # Word文档解析器类型
      xlsx: ${PARSER_TYPE_XLSX:pipline_html}  # Excel表格解析器类型
      pdf: ${PARSER_TYPE_PDF:normal}  # PDF文档解析器类型

  # --- 海关数据文件配置 ---
  customs-data:
    # 基础目录路径（本地模式使用）
    base-dir: ${CUSTOMS_DATA_BASE_DIR:D:/azs/share_volumn_01}
    # 访问模式：local（本地文件系统）或 remote（远程SMB共享）
    access-mode: ${CUSTOMS_DATA_ACCESS_MODE:local}
    # SMB配置（远程模式使用）
    smb-host: ${CUSTOMS_DATA_SMB_HOST:192.168.1.3}  # SMB服务器IP地址
    smb-share-path: ${CUSTOMS_DATA_SMB_SHARE_PATH:/财务部/2-2核算组/23_智能体抓取数据源}  # SMB共享路径
    # SMB认证配置（可选，如果Windows启用来宾访问可以不填）
    smb-username: ${CUSTOMS_DATA_SMB_USERNAME:zhinegti}  # SMB用户名
    smb-password: ${CUSTOMS_DATA_SMB_PASSWORD:zhinegti123456}  # SMB密码
    smb-domain: ${CUSTOMS_DATA_SMB_DOMAIN:WORKGROUP}  # SMB域名/工作组

  # --- 数据比对功能配置 ---
  comparison:
    prompt-file: ${PROMPT_FILE_PATH:prompts/comparison-prompts.md}  # 比对提示词文件路径
    output-dir: ${OUTPUT_DIR:./output/comparison}  # 比对结果输出目录
    server-url: ${SERVER_URL:http://localhost:20263}  # 服务器访问地址（用于生成下载链接）

# ============================================
# Knife4j API文档增强配置
# ============================================
knife4j:
  enable: true  # 是否启用Knife4j
  setting:
    language: zh_cn  # 界面语言（中文）
    swagger-model-name: 实体类列表
  documents:
    - name: 说明文档
      locations: classpath:markdown/*
      group: 测试
  basic:
    enable: false  # 是否启用基本认证
    username: abc  # 基本认证用户名
    password: 123  # 基本认证密码
  insight:
    enable: true  # 是否启用Insight
    service-name: boot3  # 服务名称
    secret: S6CsnS8AnPVyb8vvChcdXm4R3p6A6KlAISxBg3IIEgk=  # 密钥
    server: http://localhost:10086  # Insight服务器地址
    namespace: spring3  # 命名空间

# ============================================
# K3Cloud ERP系统配置
# ============================================
k3cloud:
  url: ${K3CLOUD_URL}  # K3Cloud系统访问地址（如：http://192.168.1.47/K3Cloud）

# ============================================
# 环境变量配置（开发环境默认值）
# ============================================
# --- K3Cloud配置 ---
K3CLOUD_URL: http://192.168.1.47/K3Cloud  # K3Cloud系统地址

# --- 文件解析服务配置 ---
APP_PY_ENGINE_BASE_URLS: http://ddns.enterpriseai.com.cn:30201/azs-unstructured-api/file/parser/  # 远程解析服务地址

# --- 大模型API配置 ---
LLM_API_BASE_URL: https://api.moonshot.cn/v1/chat/completions  # Moonshot API地址
LLM_API_MODEL: kimi-k2.5  # Kimi模型名称
LLM_API_KEY: sk-hUygjUKgjvT9xe727YQFNQGFrSNVWf5U2bQkkx2jNBQSK7L2  # API密钥
LLM_THINKING_ENABLED: false  # 思考模式开关
LLM_API_MAX_RETRIES: 3  # 最大重试次数（处理网络抖动和DNS解析失败）
LLM_API_RETRY_DELAY_BASE: 1000  # 重试延迟基础值（毫秒，采用指数退避策略）
LLM_API_TIMEOUT: 60000  # API请求超时时间（毫秒）

# --- 海关数据配置 ---
CUSTOMS_DATA_BASE_DIR: D:/azs/share_volumn_01  # 本地海关数据目录
CUSTOMS_DATA_ACCESS_MODE: local  # 访问模式（local/remote）

# --- 文件解析器类型 ---
PARSER_TYPE_DOCX: to_html  # Word文档解析为HTML
PARSER_TYPE_XLSX: pipline_html  # Excel表格解析为HTML
PARSER_TYPE_PDF: normal  # PDF文档正常解析