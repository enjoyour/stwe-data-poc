server:
  port: 20263
  servlet:
    context-path: /
spring:
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  application:
    name: stwe-data-poc

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    #operations-sorter: order
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      display-name: '测试'
      paths-to-match: '/**'
      packages-to-scan: com.toowe.stwe.controller
  default-flat-param-object: true

app:
  llm-api:
    url: ${LLM_API_BASE_URL}
    model: ${LLM_API_MODEL}
    api-key: ${LLM_API_KEY}
    thinking-enabled: ${LLM_THINKING_ENABLED:false}
  parser-api:
    url: ${APP_PY_ENGINE_BASE_URLS}
    grant-code: test
  customs-data:
    # 基础目录路径（本地模式使用）
    base-dir: ${CUSTOMS_DATA_BASE_DIR:D:/azs/share_volumn_01}
    # 访问模式: local（本地）或 remote（远程SMB）
    access-mode: ${CUSTOMS_DATA_ACCESS_MODE:local}
    # SMB配置（远程模式使用）
    smb-host: ${CUSTOMS_DATA_SMB_HOST:192.168.1.3}
    smb-share-path: ${CUSTOMS_DATA_SMB_SHARE_PATH:/财务部/2-2核算组/23_智能体抓取数据源}
    # SMB认证（可选，如果Windows启用来宾访问可以不填）
    smb-username: ${CUSTOMS_DATA_SMB_USERNAME:zhinegti}
    smb-password: ${CUSTOMS_DATA_SMB_PASSWORD:zhinegti123456}
    smb-domain: ${CUSTOMS_DATA_SMB_DOMAIN:WORKGROUP}
  comparison:
    prompt-file: ${PROMPT_FILE_PATH:prompts/comparison-prompts.md}
    output-dir: ${OUTPUT_DIR:./output/comparison}
    server-url: ${SERVER_URL:http://localhost:20263}

